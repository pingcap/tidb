# sync_diff_inspector config: verify MySQL source == TiDB target after
# dumpling --rows chunking + lightning reimport.

check-thread-count = 4
export-fix-sql = true
check-struct-only = false

[task]
    output-dir = "./output"
    source-instances = ["mysql1"]
    target-instance = "tidb0"
    target-check-tables = ["composite_string_key_large.events", "composite_string_key_large.translations"]

[data-sources]
[data-sources.mysql1]
host = "127.0.0.1"
port = 3306
user = "root"
password = ""

[data-sources.tidb0]
host = "127.0.0.1"
port = 4000
user = "root"
password = ""

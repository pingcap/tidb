### tidb-lightning config for composite_string_key_large round-trip

[lightning]
server-mode = false
level = "error"
check-requirements = false

[tikv-importer]
backend = "tidb"
on-duplicate = "error"

[mydumper]
data-source-dir = "/tmp/dumpling_test_result/sql_res.composite_string_key_large"

[tidb]
host = "127.0.0.1"
port = 4000
user = "root"
password = ""
status-port = 10080

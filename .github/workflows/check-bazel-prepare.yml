name: Check Bazel Prepare
on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: check-bazel-prepare-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    name: Check Bazel Prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 1.25
          cache: false
      - name: Set up Bazelisk
        uses: bazel-contrib/setup-bazel@8310a45e30297e76bc8fbae427fb6068efa01eb8 # 0.16.0
        with:
          bazelisk-cache: false
          repository-cache: false
          external-cache: false
      - name: Check Bazel Prepare
        shell: bash
        run: |
          set -euo pipefail
          # Avoid the TiDB CI path that assumes Jenkins-owned temp directories.
          unset CI
          make check-bazel-prepare

name: Upload Go Module Mirrors

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: read

jobs:
  detect:
    name: Detect Go Module Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.gomod.outputs.changed }}
    steps:
      - name: Detect Go module changes
        id: gomod
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          changed=false
          while IFS= read -r path; do
            case "${path}" in
              go.mod|go.sum|pkg/parser/go.mod|pkg/parser/go.sum)
                changed=true
                break
                ;;
            esac
          done < <(gh pr diff "${PR_NUMBER}" --repo "${REPOSITORY}" --name-only)

          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"
  upload:
    name: Upload Go Module Mirrors
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment: gcs-mirror-upload
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
      - name: Set up bazelisk
        uses: bazel-contrib/setup-bazel@0.16.0
      - name: Upload Go Module Mirrors
        env:
          GCS_MIRROR_SA_KEY: ${{ secrets.GCS_MIRROR_SA_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcs-credentials.json
        run: |
          set -euo pipefail
          unset CI

          if [[ -z "${GCS_MIRROR_SA_KEY}" ]]; then
            echo "Skip mirror upload because GCS_MIRROR_SA_KEY is not available."
            exit 0
          fi

          printf '%s' "${GCS_MIRROR_SA_KEY}" > "${GOOGLE_APPLICATION_CREDENTIALS}"
          chmod 600 "${GOOGLE_APPLICATION_CREDENTIALS}"
          sed -i '/bazel-cache/d' DEPS.bzl
          sed -i '/ats.apps.svc/d' DEPS.bzl
          sed -i '/bazel-cache/d' WORKSPACE
          sed -i '/ats.apps.svc/d' WORKSPACE
          bazel run --norun_validations //cmd/mirror -- --mirror --upload

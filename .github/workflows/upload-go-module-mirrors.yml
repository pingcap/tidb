name: Upload Go Module Mirrors

on:
  pull_request_target:
    branches:
      - master

permissions:
  contents: read
  packages: read

jobs:
  upload:
    name: Upload Go Module Mirrors
    runs-on: ubuntu-latest
    environment: gcs-mirror-upload
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr
          persist-credentials: false
      - name: Upload Go Module Mirrors
        env:
          GH_TOKEN: ${{ github.token }}
          GCS_MIRROR_SA_KEY: ${{ secrets.GCS_MIRROR_SA_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcs-credentials.json
        run: |
          set -euo pipefail
          unset CI

          if [[ -z "${GCS_MIRROR_SA_KEY}" ]]; then
            echo "Skip mirror upload because GCS_MIRROR_SA_KEY is not available."
            exit 0
          fi

          printf '%s' "${GCS_MIRROR_SA_KEY}" > "${GOOGLE_APPLICATION_CREDENTIALS}"
          chmod 600 "${GOOGLE_APPLICATION_CREDENTIALS}"
          sed -i '/bazel-cache/d' pr/DEPS.bzl
          sed -i '/ats.apps.svc/d' pr/DEPS.bzl
          sed -i '/bazel-cache/d' pr/WORKSPACE
          sed -i '/ats.apps.svc/d' pr/WORKSPACE

          docker run --rm \
            -e GOOGLE_APPLICATION_CREDENTIALS=/credentials/gcs-credentials.json \
            -v "${GOOGLE_APPLICATION_CREDENTIALS}:/credentials/gcs-credentials.json:ro" \
            -v "${PWD}/pr:/workspace:ro" \
            us-docker.pkg.dev/gcp-compute-dev/tidb-ci-public/tidb-mirror-uploader:20260508
